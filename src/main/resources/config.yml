# 插件提示前缀
prefix: "&7[&aCarry&bYou&7] "

# 逃脱所需要的CPS（每秒点击次数）
# 默认值: 6.0 表示需要每秒点击6次才能挣脱

needed_cps: 6.0
# 进度条设置
progress_bar:
  # 进度条长度（字符数）
  length: 20

  # 进度条左边符号
  left: "&7["

  # 进度条右边符号
  right: "&7]"

  # 空心的心形（未完成部分）
  empty: "&c♡"

  # 实心的心形（已完成部分）
  filled: "&c♥"
deny_worlds: #这些世界禁止抓举！ 但是管理员干什么都可以哦
  - "world_the_end"

deny_entities: #这些生物禁止抓举！ 但是如果是管理员的话...
  - "ender_dragon"

# 丢出力度设置
throw_power:
  # SHIFT + F键丢出的力度
  drop: 0.1
  # 左键/攻击丢出的力度
  attack: 0.9
  # 右键丢出的力度
  interact: 0.4
