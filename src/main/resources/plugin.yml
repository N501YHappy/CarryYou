name: CarryYou
version: '${version}'
main: xyz.n501yhappy.carryyou.CarryYou
api-version: '1.16'
prefix: §7[§aCarry§bYou§7]
authors: [ N501YHappy ]
description: 把生物拿在手上
softdepend: [WorldGuard]

commands:
  carryyou:
    description: 重新加载插件配置
    usage: /<command> reload
    aliases: [cy]

permissions:
  carryyou.reload:
    description: 允许重新加载插件配置
    default: op
  carryyou.uncarried:
    description: 抱不了！
    default: false

  carryyou.unbreak:
    description: 跑不了！
    default: false
  carryyou.can:
    description: 可以抱别人
    default: true